openapi: 3.0.3
info:
  title: "[FEATURE_NAME] API"
  version: "1.0.0"
  description: |
    API contract for the [FEATURE_NAME] feature.
    Generated from cofihy contract system.

servers:
  - url: "{baseUrl}/api/v1"
    description: "[API_STYLE] API server"
    variables:
      baseUrl:
        default: "http://localhost:3000"

paths:
  /[resource]:
    get:
      operationId: list[Resource]
      summary: "List [resource] items"
      tags:
        - "[FEATURE_NAME]"
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List[Resource]Response"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: create[Resource]
      summary: "Create a new [resource]"
      tags:
        - "[FEATURE_NAME]"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create[Resource]Request"
      responses:
        "201":
          description: "Created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/[Resource]Response"
        "422":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /[resource]/{id}:
    get:
      operationId: get[Resource]
      summary: "Get a single [resource]"
      tags:
        - "[FEATURE_NAME]"
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "200":
          description: "Successful response"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/[Resource]Response"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: update[Resource]
      summary: "Update a [resource]"
      tags:
        - "[FEATURE_NAME]"
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Update[Resource]Request"
      responses:
        "200":
          description: "Updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/[Resource]Response"
        "422":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: delete[Resource]
      summary: "Delete a [resource]"
      tags:
        - "[FEATURE_NAME]"
      parameters:
        - $ref: "#/components/parameters/ResourceId"
      responses:
        "204":
          description: "Deleted"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: "Unique identifier of the [resource]"

  schemas:
    Create[Resource]Request:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000

    Update[Resource]Request:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000

    [Resource]:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    [Resource]Response:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/[Resource]"

    List[Resource]Response:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/[Resource]"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

  responses:
    Unauthorized:
      description: "Authentication required"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: "Resource not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ValidationError:
      description: "Validation failed"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
