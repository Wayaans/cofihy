openapi: 3.0.3
info:
  title: "Example Feature API"
  version: "1.0.0"
  description: |
    API contract for the Example Feature.
    Manages items as a generic CRUD resource.

servers:
  - url: "{baseUrl}/api/v1"
    description: "[API_STYLE] API server"
    variables:
      baseUrl:
        default: "http://localhost:3000"

paths:
  /items:
    get:
      operationId: listItems
      summary: "List items"
      tags:
        - "example-feature"
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: sort
          in: query
          schema:
            type: string
            default: "-created_at"
      responses:
        "200":
          description: "List of items"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListItemsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createItem
      summary: "Create a new item"
      tags:
        - "example-feature"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemRequest"
      responses:
        "201":
          description: "Item created"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /items/{id}:
    get:
      operationId: getItem
      summary: "Get a single item"
      tags:
        - "example-feature"
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "200":
          description: "Item details"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateItem
      summary: "Update an item"
      tags:
        - "example-feature"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemRequest"
      responses:
        "200":
          description: "Item updated"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteItem
      summary: "Delete an item"
      tags:
        - "example-feature"
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "204":
          description: "Item deleted"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "[AUTH_STRATEGY]"

  parameters:
    ItemId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: "Unique identifier of the item"

  schemas:
    CreateItemRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum: [active, archived]
          default: active

    UpdateItemRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum: [active, archived]

    Item:
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier"
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, archived]
        created_by:
          type: string
          description: "User ID of creator"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ItemResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Item"

    ListItemsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

  responses:
    Unauthorized:
      description: "Authentication required"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "UNAUTHORIZED"
              message: "Authentication required"
              details: []

    NotFound:
      description: "Resource not found"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "NOT_FOUND"
              message: "Item not found"
              details: []

    ValidationError:
      description: "Validation failed"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: "VALIDATION_ERROR"
              message: "Validation failed"
              details:
                - field: "title"
                  message: "Title is required"
